name: ci

on:
  push:
    branches: [main]
  pull_request:

# Actions are pinned to commit SHAs (not tags). Tag comments track which
# human-readable release the SHA corresponds to. Bump deliberately.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.22'
          cache: true
      - name: tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: vet
        run: go vet ./...
      - name: build
        run: make build
      - name: test
        run: make test

  e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.22'
          cache: true
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.23.0
      - name: build image
        run: docker build -t ghcr.io/se-wo/sigillum:ci .
      - name: load image
        run: kind load docker-image ghcr.io/se-wo/sigillum:ci
      - name: e2e
        env:
          SIGILLUM_E2E: "1"
        run: make e2e
