{{- if and .Values.api.enabled .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels: {{- include "sigillum.api.selectorLabels" . | nindent 6 }}
{{- end }}
