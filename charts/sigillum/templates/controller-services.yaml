{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sigillum.controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "sigillum.controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.controller.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end }}
---
{{- if and .Values.controller.enabled .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sigillum.webhook.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "sigillum.controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: webhook
      protocol: TCP
{{- end }}
