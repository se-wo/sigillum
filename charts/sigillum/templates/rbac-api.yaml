{{- if and .Values.rbac.create .Values.api.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
rules:
  # Validate caller tokens.
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  # Read CRDs in all namespaces (policies are namespace-scoped, backends are
  # cluster-scoped).
  - apiGroups: [sigillum.dev]
    resources: [mailbackends, clustermailbackends, mailpolicies]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sigillum.api.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sigillum.api.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Secret access is namespace-scoped to prevent cross-namespace credential reads.
# Use rbac.allowedSecretNamespaces to grant access to additional namespaces
# where ClusterMailBackend credentials live.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sigillum.api.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sigillum.api.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sigillum.api.fullname" . }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "sigillum.api.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- range .Values.rbac.allowedSecretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sigillum.api.fullname" $ }}-secret-reader
  namespace: {{ . }}
  labels: {{- include "sigillum.api.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sigillum.api.fullname" $ }}-secret-reader
  namespace: {{ . }}
  labels: {{- include "sigillum.api.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sigillum.api.fullname" $ }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "sigillum.api.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
