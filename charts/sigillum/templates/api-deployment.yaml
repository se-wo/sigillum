{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: {{- include "sigillum.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sigillum.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}{{- toYaml . | nindent 8 }}{{- end }}
      annotations:
        {{- with .Values.api.podAnnotations }}{{- toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "sigillum.api.fullname" . }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sigillum
          image: {{ include "sigillum.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=api
            - --listen=:{{ .Values.api.service.port }}
            - --metrics-listen=:{{ .Values.api.metricsPort }}
            - --token-audience={{ .Values.api.tokenAudience }}
            - --token-cache-size={{ .Values.api.tokenCacheSize }}
            - --token-cache-ttl={{ .Values.api.tokenCacheTTL }}
            - --shutdown-timeout={{ .Values.api.shutdownTimeout }}
            {{- range .Values.api.extraArgs }}
            - {{ . }}
            {{- end }}
          env:
            - name: SIGILLUM_LOG_LEVEL
              value: {{ .Values.logLevel }}
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            {{- if .Values.api.tls.secretName }}
            - name: SIGILLUM_TLS_CERT
              value: /etc/sigillum/tls/tls.crt
            - name: SIGILLUM_TLS_KEY
              value: /etc/sigillum/tls/tls.key
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
            - name: metrics
              containerPort: {{ .Values.api.metricsPort }}
          readinessProbe:
            httpGet: { path: /readyz, port: http, scheme: {{ ternary "HTTPS" "HTTP" (ne .Values.api.tls.secretName "") }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http, scheme: {{ ternary "HTTPS" "HTTP" (ne .Values.api.tls.secretName "") }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.api.tls.secretName }}
          volumeMounts:
            - name: tls
              mountPath: /etc/sigillum/tls
              readOnly: true
          {{- end }}
      {{- if .Values.api.tls.secretName }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.api.tls.secretName }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
