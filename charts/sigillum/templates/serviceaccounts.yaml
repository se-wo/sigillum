{{- if .Values.api.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
{{- end }}
---
{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sigillum.controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.controller.labels" . | nindent 4 }}
{{- end }}
