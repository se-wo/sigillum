{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sigillum.api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "sigillum.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector: {{- include "sigillum.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.api.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end }}
