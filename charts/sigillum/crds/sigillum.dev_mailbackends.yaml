---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: mailbackends.sigillum.dev
spec:
  group: sigillum.dev
  names:
    categories:
    - sigillum
    kind: MailBackend
    listKind: MailBackendList
    plural: mailbackends
    shortNames:
    - mb
    singular: mailbackend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MailBackend is a namespace-scoped backend referenced from MailPolicies in
          the same namespace. Credentials referenced via spec.smtp.credentialsRef
          resolve to the MailBackend's own namespace when no explicit namespace is set.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackendSpec is the shared shape of MailBackend.spec and ClusterMailBackend.spec.
            properties:
              healthCheck:
                description: HealthCheck controls periodic probing.
                properties:
                  enabled:
                    default: true
                    type: boolean
                  intervalSeconds:
                    default: 60
                    format: int32
                    minimum: 10
                    type: integer
                type: object
              smtp:
                description: SMTP is required when type == smtp.
                properties:
                  authType:
                    default: NONE
                    description: AuthType chooses the SASL mechanism for upstream
                      auth. Defaults to NONE.
                    enum:
                    - NONE
                    - PLAIN
                    - LOGIN
                    - CRAM-MD5
                    type: string
                  connectionTimeoutSeconds:
                    default: 10
                    description: ConnectionTimeoutSeconds caps each dial / handshake
                      attempt.
                    format: int32
                    maximum: 120
                    minimum: 1
                    type: integer
                  credentialsRef:
                    description: |-
                      CredentialsRef points at the secret holding upstream credentials.
                      Required unless AuthType is NONE.
                    properties:
                      name:
                        minLength: 1
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  endpoints:
                    description: Endpoints is an ordered failover list. At least one
                      entry is required.
                    items:
                      description: |-
                        SMTPEndpoint is one host:port pair in a backend's failover list.
                        The driver tries endpoints in declared order and uses the first Ready one.
                      properties:
                        host:
                          minLength: 1
                          type: string
                        insecureSkipVerify:
                          description: InsecureSkipVerify disables TLS certificate
                            verification. Off by default.
                          type: boolean
                        port:
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                        tls:
                          default: starttls
                          description: SMTPTLSMode controls how Sigillum negotiates
                            TLS with the upstream relay.
                          enum:
                          - none
                          - starttls
                          - tls
                          type: string
                      required:
                      - host
                      - port
                      type: object
                    minItems: 1
                    type: array
                  heloDomain:
                    description: HeloDomain is sent in the SMTP HELO/EHLO command.
                      Defaults to "sigillum".
                    type: string
                required:
                - endpoints
                type: object
              type:
                description: Type discriminates which backend-specific block (smtp,
                  ...) is read.
                enum:
                - smtp
                - microsoftGraph
                - sendgrid
                - gmail
                type: string
            required:
            - type
            type: object
          status:
            description: BackendStatus is the shared status of MailBackend and ClusterMailBackend.
            properties:
              capabilities:
                description: Capabilities advertised by the active driver.
                items:
                  description: |-
                    Capability is a feature flag advertised by a Driver and surfaced in
                    Backend.status.capabilities. v1 only emits `send`.
                  enum:
                  - send
                  - read
                  - subscribeEvents
                  - folders
                  type: string
                type: array
              conditions:
                description: Conditions follows the standard Kubernetes pattern. Always
                  includes "Ready".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpointStatus:
                description: EndpointStatus mirrors spec.smtp.endpoints in order.
                items:
                  description: EndpointStatus captures the last probe result for one
                    endpoint.
                  properties:
                    host:
                      type: string
                    message:
                      type: string
                    port:
                      format: int32
                      type: integer
                    ready:
                      type: boolean
                  required:
                  - host
                  - port
                  - ready
                  type: object
                type: array
              lastProbeTime:
                description: LastProbeTime is the wall-clock time of the most recent
                  health check.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation reflected by
                  this status.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
