---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sigillum-controller
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sigillum.dev
  resources:
  - clustermailbackends
  - mailbackends
  - mailpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sigillum.dev
  resources:
  - clustermailbackends/finalizers
  - mailbackends/finalizers
  verbs:
  - update
- apiGroups:
  - sigillum.dev
  resources:
  - clustermailbackends/status
  - mailbackends/status
  - mailpolicies/status
  verbs:
  - get
  - patch
  - update
